on:
  push:
    tags:
      - 'v*'
name: Release
jobs:
  release:
    name: Release (Tauri)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      # 署名・notarize は tauri-action が環境変数から行う。
      # 必要な Secrets: CERT（Developer ID Application の p12 を base64 化したもの）、
      # CERT_PASS、APPLE_ID、APPLE_ID_PASS（App 用パスワード）
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.CERT }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CERT_PASS }}
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: Rin Nakashima (4Z474DZ677)'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
          APPLE_TEAM_ID: 4Z474DZ677
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'taskbar.fm ${{ github.ref_name }}'
          releaseDraft: true
